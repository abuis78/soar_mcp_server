# ==============================================================================
# SOAR MCP Server — Default Configuration
# ==============================================================================
#
# This file configures the SOAR MCP Server endpoint.
# To override settings, copy this file to:
#   <soar_app_dir>/soar_mcp_server/local/mcp.conf
# and edit the local copy. Local values take precedence over defaults.
#
# The MCP endpoint is accessible at:
#   https://<soar-host>/rest/handler/phantom_soar_mcp_server/mcp
#
# Connect Claude Desktop by adding to claude_desktop_config.json:
#   {
#     "mcpServers": {
#       "splunk-soar": {
#         "url": "https://<soar-host>/rest/handler/phantom_soar_mcp_server/mcp",
#         "headers": { "ph-auth-token": "<your-soar-auth-token>" }
#       }
#     }
#   }
#
# Connect Claude Code by adding to ~/.claude.json:
#   {
#     "mcpServers": {
#       "splunk-soar": {
#         "type": "http",
#         "url": "https://<soar-host>/rest/handler/phantom_soar_mcp_server/mcp",
#         "headers": { "ph-auth-token": "<your-soar-auth-token>" }
#       }
#     }
#   }
# ==============================================================================

[server]
# Timeout in seconds for internal SOAR REST API calls made by the MCP tools.
# Default: 60.0
timeout = 60.0

# Maximum number of results any single tool call may return.
# Prevents runaway queries from overwhelming the MCP context window.
# Default: 50
max_results = 50

# SSL verification for outbound calls to the SOAR REST API.
#   true   : Verify using system CA bundle (default, recommended for production)
#   false  : Disable verification (use only in dev/test with self-signed certs)
#   <path> : Path to a custom PEM/CRT CA bundle
# Default: true
ssl_verify = true

# Log every MCP tool call (tool name, arguments, result status) to SOAR's
# phantom.log for auditing. Recommended: true.
# Default: true
log_tool_calls = true

# MCP protocol version to advertise during the initialize handshake.
# Default: 2024-11-05
protocol_version = 2024-11-05

# Server name advertised to MCP clients.
# Default: splunk-soar-mcp-server
server_name = splunk-soar-mcp-server

# Server version advertised to MCP clients.
# Default: 1.0.0
server_version = 1.0.0


# ==============================================================================
# [tools] — Enable or disable individual MCP tools.
# Set a tool to false to hide it from MCP clients completely.
# ==============================================================================

[tools]

# ── Read-only tools (safe by default) ────────────────────────────────────────

# List cases/containers with optional filters (status, severity, owner, label)
list_cases = true

# Get full details of a specific case (title, description, status, severity, tags)
get_case = true

# Search cases by keyword across title, description, and tags
search_cases = true

# List all artifacts belonging to a case
list_artifacts = true

# Get full details of a specific artifact
get_artifact = true

# List notes/comments on a case
list_case_notes = true

# List available playbooks (name, description, category)
list_playbooks = true

# Get the status and results of a specific playbook run
get_playbook_run = true

# List recent action runs with status and results
list_action_runs = true

# List SOAR users (useful for triage and assignment suggestions)
list_users = true

# Get system-level SOAR info (version, license status)
get_soar_info = true

# ── Write tools (disabled by default — enable explicitly in local/mcp.conf) ──

# Add a note/comment to a case. Advisory: analyst should review before adding.
add_case_note = false

# Run a playbook on a case. HIGH IMPACT — review carefully before enabling.
run_playbook = false

# Update case status (open, closed, resolved, etc.)
update_case_status = false

# Update case severity (high, medium, low, informational)
update_case_severity = false

# Update case owner/assignee
update_case_owner = false

# Add a new artifact to a case
create_artifact = false


# ==============================================================================
# [safety] — Safety and advisory settings.
# ==============================================================================

[safety]

# Add a disclaimer to all tool responses reminding the MCP client that
# write operations should be reviewed by a human before acting.
# Default: true
advisory_disclaimer = true

# Restrict which SOAR container labels/types are accessible via MCP.
# Empty = all labels accessible. Comma-separated list to restrict.
# Example: allowed_labels = phishing,malware,investigation
# Default: (empty = all allowed)
allowed_labels =

# Maximum number of notes or artifacts per case that will be returned.
# Default: 20
max_items_per_case = 20

# Minimum case severity to include in list_cases results (empty = all).
# Accepted values: high, medium, low, informational
# Example: min_severity = medium
# Default: (empty = no minimum)
min_severity =

[tokens]
# Scoped MCP token settings (v1.5.0+).
#
# When enabled, presented auth headers are first looked up in the app's local
# token store (mint via the 'mint mcp token' action). Matching scoped tokens
# get tool restrictions, audit, and per-token rate limiting. Legacy
# full-access SOAR ph-auth-tokens continue to work as a fallback unless
# scoped_tokens_required is also set.

# Set to true to activate the scoped token store. Off by default so existing
# deployments are unaffected on upgrade — opt in once you've minted at least
# one token with the 'mint mcp token' action.
scoped_tokens_enabled = false

# Reject any request that does not present a recognised scoped MCP token.
# Use after migrating all clients off shared ph-auth-tokens.
# Default off so upgrades do not break existing integrations.
scoped_tokens_required = false

# Emit an info log line when a legacy full ph-auth-token is used.
# Helps spot lingering legacy clients during migration.
legacy_full_token_warn = true

# Default lifetime for newly minted tokens (days). 0 / unset = never expires.
default_lifetime_days = 90

# Per-token rate limit (requests per minute, sliding window).
# 0 disables rate limiting.
# Note: this limit is enforced per-process. In multi-worker SOAR deployments
# (multiple Django/WSGI workers) the effective limit across all workers is
# rate_limit_per_minute * <worker_count>. Do not rely on this as a hard
# DoS ceiling — use a reverse-proxy rate limit for that.
rate_limit_per_minute = 120
