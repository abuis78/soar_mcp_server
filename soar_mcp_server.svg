  <line x1="27" y1="32" x2="27" y2="38" stroke="#50d080" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="32" x2="37" y2="38" stroke="#50d080" stroke-width="2" stroke-linecap="round"/>
